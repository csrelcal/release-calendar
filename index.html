<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release Calendar 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: rgba(255,255,255,0.07);
    --text: #f0ede8;
    --muted: #6b6a6e;
    --accent: #e8c97a;
    --tonight: #e87a7a;
    --renders: #e8c97a;
    --wip: #7ab2e8;
    --post: #7ae8b2;
    --shoot: #b27ae8;
    --preprod: #e8a87a;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  .hero {
    padding: 80px 48px 60px;
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
  }

  .hero-left { max-width: 500px; }

  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 6vw, 72px);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 em { font-style: italic; color: var(--accent); }

  .hero-right { text-align: right; }

  .stat-big {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .today-tag {
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    letter-spacing: 0.04em;
  }

  .legend {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 48px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .main { max-width: 1100px; margin: 0 auto; padding: 0 48px 80px; }

  .month-section { padding-top: 15px; }
  .month-section.hidden { display: none; }

  .month-heading {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .month-heading::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: var(--accent);
  }

  .releases-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .release-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    cursor: default;
    animation: fadeUp 0.4s ease both;
  }

  .release-card.hidden { display: none; }

  .release-card:hover {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.14);
    background: var(--surface2);
  }

  .release-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 12px 0 0 12px;
  }

  .release-card.tonight::before { background: var(--tonight); }
  .release-card.renders::before { background: var(--renders); }
  .release-card.wip::before     { background: var(--wip); }
  .release-card.post::before    { background: var(--post); }
  .release-card.shoot::before   { background: var(--shoot); }
  .release-card.preprod::before { background: var(--preprod); }

  .release-card.tonight {
    background: linear-gradient(135deg, #1e1515 0%, #161618 60%);
    border-color: rgba(232,122,122,0.2);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .card-date { display: flex; flex-direction: column; }

  .card-date-num {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
  }

  .release-card.tonight .card-date-num { color: var(--tonight); }

  .card-date-month {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
  }

  .status-badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .tonight .status-badge { background: rgba(232,122,122,0.15); color: var(--tonight); }
  .renders .status-badge { background: rgba(232,201,122,0.15); color: var(--renders); }
  .wip .status-badge     { background: rgba(122,178,232,0.15); color: var(--wip); }
  .post .status-badge    { background: rgba(122,232,178,0.15); color: var(--post); }
  .shoot .status-badge   { background: rgba(178,122,232,0.15); color: var(--shoot); }
  .preprod .status-badge { background: rgba(232,168,122,0.15); color: var(--preprod); }

  /* Released Today badge */
  .released-today-badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
    background: rgba(122,232,178,0.15);
    color: var(--post);
  }

  .release-card.released-today {
    border-color: rgba(122,232,178,0.25);
    box-shadow: 0 0 0 1px rgba(122,232,178,0.1);
  }

  .release-card.released-today::before { background: var(--post); }

  /* Next Release badge */
  .next-release-badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
    background: var(--accent);
    color: #0d0d0f;
    animation: pulse-badge 2s ease-in-out infinite;
  }

  @keyframes pulse-badge {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .release-card.next-release {
    border-color: rgba(232,201,122,0.35);
    box-shadow: 0 0 0 1px rgba(232,201,122,0.15);
  }

  .release-card.next-release::before { background: var(--accent); }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
  }

  .card-subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    letter-spacing: 0.04em;
  }

  .empty-state {
    display: none;
    padding: 60px 0;
    text-align: center;
  }

  .empty-state.visible { display: block; }

  .empty-state-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
  }

  .empty-state-sub {
    font-size: 14px;
    color: var(--muted);
  }

  footer {
    border-top: 1px solid var(--border);
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-text { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .release-card:nth-child(1)  { animation-delay: 0.05s; }
  .release-card:nth-child(2)  { animation-delay: 0.10s; }
  .release-card:nth-child(3)  { animation-delay: 0.15s; }
  .release-card:nth-child(4)  { animation-delay: 0.20s; }
  .release-card:nth-child(5)  { animation-delay: 0.25s; }
  .release-card:nth-child(6)  { animation-delay: 0.30s; }
  .release-card:nth-child(7)  { animation-delay: 0.35s; }
  .release-card:nth-child(8)  { animation-delay: 0.40s; }
  .release-card:nth-child(9)  { animation-delay: 0.45s; }
  .release-card:nth-child(10) { animation-delay: 0.50s; }

  @media (max-width: 700px) {
    .hero { gap: 32px; padding: 48px 24px 20px; }
    .hero-right { text-align: left; }
    .legend { padding: 16px 24px; }
    .main { padding: 0 24px 60px; }
    footer { padding: 20px 24px; flex-direction: column; gap: 8px; text-align: center; }
    .releases-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-left">
    <p class="eyebrow">Chai Shots</p>
    <h1>Release<br><em>Calendar</em></h1>
  </div>
  <div class="hero-right">
    <div class="stat-big" id="release-count">—</div>
    <div class="stat-label">Upcoming Releases</div>
    <div class="today-tag" id="today-tag"></div>
  </div>
</header>

<main class="main">

  <div class="empty-state" id="empty-state">
    <div class="empty-state-title">All caught up!</div>
    <div class="empty-state-sub">No upcoming releases scheduled.</div>
  </div>

</main>

<footer>
  <span class="footer-text" id="footer-count">— releases</span>
  <span class="footer-text">Mar – May 2026</span>
</footer>

<script>
  (function () {
    const STORAGE_KEY = 'chaishots_releases';

    const STATUS_LABELS = {
      tonight: 'Releasing Tonight',
      renders: 'Final Renders',
      wip:     'WIP',
      post:    'In Post',
      shoot:   'In Shoot',
      preprod: 'Pre Production'
    };

    const DEFAULT_RELEASES = [
      { id:1,  date:'2026-03-18', title:'Tejimola',                       subtitle:'',                             status:'tonight'  },
      { id:2,  date:'2026-03-21', title:'Rayudu Gaari Pelli',             subtitle:'Final renders by Thursday',    status:'renders'  },
      { id:3,  date:'2026-03-25', title:'Adipoli Apartments',             subtitle:'Telugu Dubbing — In Progress', status:'wip'      },
      { id:4,  date:'2026-03-28', title:'Worst Character', subtitle:'',                             status:'post'     },
      { id:5,  date:'2026-04-01', title:'Love in Phalgam',                subtitle:'',                             status:'post'     },
      { id:6,  date:'2026-04-04', title:'Shiva Mahatyam', subtitle:'',                             status:'post'     },
      { id:7,  date:'2026-04-08', title:'Love in Mussorie',               subtitle:'',                             status:'post'     },
      { id:8,  date:'2026-04-11', title:'Sai Leelalu',   subtitle:'',                             status:'post'     },
      { id:9,  date:'2026-04-15', title:'15 Minutes',  subtitle:'',                             status:'post'     },
      { id:10, date:'2026-04-18', title:'Auto Basha',   subtitle:'',                             status:'post'     },
      { id:11, date:'2026-04-22', title:'Nenu Mee Kalyan',  subtitle:'',                             status:'post'     },
      { id:12, date:'2026-04-25', title:'Musugu Veyoddhu',                subtitle:'',                             status:'shoot'    },
      { id:13, date:'2026-04-29', title:'Rakaasi Pilla',                  subtitle:'Abyab',                        status:'post'     },
      { id:14, date:'2026-05-02', title:'Girl Things',                    subtitle:'',                             status:'shoot'    },
      { id:15, date:'2026-05-06', title:'EGO',                            subtitle:'',                             status:'post'     },
      { id:16, date:'2026-05-09', title:'Chaiwala Chanti',                subtitle:'',                             status:'preprod'  },
      { id:17, date:'2026-05-13', title:'Ghar ki Dehleez',                subtitle:'',                             status:'post'     },
      { id:18, date:'2026-05-16', title:'Angel Priya',                    subtitle:'',                             status:'preprod'  },
      { id:19, date:'2026-05-20', title:'Blind Date',                     subtitle:'',                             status:'post'     },
      { id:20, date:'2026-05-23', title:'Ownly Family',                   subtitle:'',                             status:'preprod'  },
      { id:21, date:'2026-05-27', title:'Nightingale',                    subtitle:'',                             status:'preprod'  },
      { id:22, date:'2026-05-30', title:'Magajathi Aanimuthyam',          subtitle:'',                             status:'preprod'  },
    ];

    // Load from localStorage or fall back to defaults
    let releases;
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      releases = stored ? JSON.parse(stored) : DEFAULT_RELEASES;
    } catch(e) {
      releases = DEFAULT_RELEASES;
    }

    // Today at midnight
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

    // Show today's date
    const todayLabel = today.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
    document.getElementById('today-tag').textContent = 'As of ' + todayLabel;

    // Group by month
    const MONTHS = {
      '03': { label: 'March 2026',  id: 'month-march' },
      '04': { label: 'April 2026',  id: 'month-april' },
      '05': { label: 'May 2026',    id: 'month-may'   },
    };

    // Clear existing static sections and rebuild dynamically
    const main = document.querySelector('.main');
    const emptyState = document.getElementById('empty-state');

    // Remove old month sections
    document.querySelectorAll('.month-section').forEach(s => s.remove());

    // Build sections from data
    const grouped = {};
    releases.forEach(r => {
      const mo = r.date.split('-')[1];
      if (!grouped[mo]) grouped[mo] = [];
      grouped[mo].push(r);
    });

    let visibleCount = 0;
    let nextCard = null;
    let nextDate = null;
    let todayCards = []; // cards releasing today

    Object.keys(grouped).sort().forEach(mo => {
      const info = MONTHS[mo] || { label: mo, id: 'month-' + mo };
      const section = document.createElement('section');
      section.className = 'month-section';
      section.id = info.id;

      const heading = document.createElement('h2');
      heading.className = 'month-heading';
      heading.textContent = info.label;
      section.appendChild(heading);

      const grid = document.createElement('div');
      grid.className = 'releases-grid';

      let sectionVisible = 0;

      grouped[mo].forEach(r => {
        const parts = r.date.split('-');
        const releaseDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
        const isPast = releaseDate < today;
        const isToday = releaseDate.getTime() === today.getTime();

        if (isPast) return; // skip past (before today)

        visibleCount++;
        sectionVisible++;

        const card = document.createElement('div');
        card.className = 'release-card ' + r.status;
        card.dataset.date = r.date;

        const dayNum = parseInt(parts[2]);
        const monthShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(parts[1])-1];

        card.innerHTML = `
          <div class="card-top">
            <div class="card-date">
              <span class="card-date-num">${dayNum}</span>
              <span class="card-date-month">${monthShort}</span>
            </div>
            <span class="status-badge">${STATUS_LABELS[r.status] || r.status}</span>
          </div>
          <div class="card-title">${r.title}</div>
          ${r.subtitle ? `<div class="card-subtitle">${r.subtitle}</div>` : ''}
        `;

        if (isToday) {
          // Collect all today's releases — they'll be marked "Released"
          todayCards.push(card);
        } else {
          // Track the next upcoming release (first future date after today)
          if (!nextDate || releaseDate < nextDate) {
            nextDate = releaseDate;
            nextCard = card;
          }
        }

        grid.appendChild(card);
      });

      section.appendChild(grid);

      if (sectionVisible > 0) {
        main.insertBefore(section, emptyState);
      }
    });

    // Mark today's releases as "Released"
    todayCards.forEach(card => {
      card.classList.add('released-today');
      const badge = card.querySelector('.status-badge');
      if (badge) badge.outerHTML = '<span class="released-today-badge">Released</span>';
    });

    // Mark the next upcoming release
    if (nextCard) {
      nextCard.classList.add('next-release');
      const badge = nextCard.querySelector('.status-badge');
      if (badge) badge.outerHTML = '<span class="next-release-badge">Next Release</span>';
    }

    // Update counts
    document.getElementById('release-count').textContent = visibleCount;
    document.getElementById('footer-count').textContent = visibleCount + ' upcoming release' + (visibleCount !== 1 ? 's' : '');

    // Show empty state if nothing
    if (visibleCount === 0) {
      document.getElementById('empty-state').classList.add('visible');
    }
  })();
</script>

</body>
</html>
